<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meon Marketplace | LogicDriven. FutureProven.</title>
  <meta name="description" content="Meon App Store – Daraja M-Pesa STK Push for seamless payments">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: radial-gradient(circle at 10% 20%, #030014, #010108);
      color: #f1f5f9;
    }
    .glass-card {
      background: rgba(15, 25, 45, 0.55);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(139, 92, 246, 0.35);
      border-radius: 2rem;
      transition: all 0.25s ease;
    }
    .app-card {
      background: rgba(18, 28, 45, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1.75rem;
      transition: all 0.25s ease;
    }
    .app-card:hover {
      transform: translateY(-6px);
      border-color: rgba(139, 92, 246, 0.7);
      box-shadow: 0 20px 35px -12px rgba(139, 92, 246, 0.3);
      background: rgba(25, 35, 55, 0.85);
    }
    .btn-primary {
      background: linear-gradient(105deg, #8b5cf6, #4f46e5);
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: linear-gradient(105deg, #9b6cff, #6366f1);
      transform: scale(0.98);
      box-shadow: 0 8px 20px -6px #8b5cf6;
    }
    .category-chip {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      transition: all 0.2s;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
    }
    .category-chip.active, .category-chip:hover {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -8px #8b5cf6;
      color: white;
    }
    .gradient-text {
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; animation: slideUp 0.3s ease; background: #1e293b; backdrop-filter: blur(12px); border-left: 4px solid #8b5cf6; border-radius: 1rem; padding: 12px 20px; color: white; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5); }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .rating-star { cursor: pointer; transition: transform 0.1s; }
    .modal-transition { transition: opacity 0.2s ease; }
    .hero-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.25), transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }
    .stats-glow {
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.1));
      border: 1px solid rgba(139,92,246,0.4);
      backdrop-filter: blur(4px);
      border-radius: 1.5rem;
    }
  </style>
</head>
<body>

<div id="app" class="min-h-screen flex flex-col">
  <!-- Header glass -->
  <header class="sticky top-0 z-50 bg-[#030014]/80 backdrop-blur-xl border-b border-purple-900/40">
    <div class="container mx-auto px-5 py-3 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="bg-gradient-to-br from-purple-900/40 to-indigo-900/40 px-4 py-2 rounded-2xl border border-purple-500/30">
          <span class="text-3xl font-black tracking-tighter text-white">meon</span>
          <span class="hidden md:inline-block text-[10px] font-bold tracking-[0.2em] text-purple-300 uppercase ml-2">MARKETPLACE</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="themeToggle" class="p-2 rounded-full hover:bg-white/10"><i data-lucide="moon" class="w-5 h-5 text-white"></i></button>
        <div id="authSection" class="flex items-center gap-2"></div>
      </div>
    </div>
    <div class="container mx-auto px-5">
      <div class="flex gap-6 overflow-x-auto pb-2">
        <button data-nav="home" class="nav-btn font-semibold py-2.5 text-sm border-b-2 border-purple-500 text-purple-300">🏠 Home</button>
        <button data-nav="dashboard" class="nav-btn font-semibold py-2.5 text-sm border-b-2 border-transparent">📊 My Dashboard</button>
        <button data-nav="admin" id="adminNavBtn" class="nav-btn hidden font-semibold py-2.5 text-sm">⚙️ Admin</button>
        <button data-nav="developer" id="devNavBtn" class="nav-btn hidden font-semibold py-2.5 text-sm">🛠️ Dev Hub</button>
      </div>
    </div>
  </header>

  <main id="mainContent" class="flex-1 container mx-auto px-5 py-8"></main>
  <div id="toastContainer"></div>
</div>

<!-- M-Pesa Modal -->
<div id="mpesaModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden modal-transition">
  <div class="bg-[#0a0f1f]/90 backdrop-blur-xl rounded-3xl p-6 w-full max-w-md border border-purple-500/40">
    <h2 class="text-2xl font-bold bg-gradient-to-r from-purple-300 to-indigo-300 bg-clip-text text-transparent">Pay with M-Pesa</h2>
    <p id="mpesaAppName" class="text-gray-300 mb-4"></p>
    <div class="mb-4"><label class="text-sm text-purple-200">Phone Number</label><input type="tel" id="mpesaPhone" placeholder="0712345678" class="w-full p-3 rounded-xl bg-white/10 border border-purple-500/30 text-white"></div>
    <div class="mb-4"><label class="text-sm text-purple-200">Amount (KES)</label><input type="number" id="mpesaAmount" readonly class="w-full p-3 rounded-xl bg-white/5 border border-purple-500/30 text-gray-300"></div>
    <div class="flex gap-3"><button id="mpesaConfirmBtn" class="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 py-3 rounded-xl font-bold">Pay Now</button><button id="mpesaCancelBtn" class="flex-1 bg-white/10 border border-white/20 py-3 rounded-xl">Cancel</button></div>
  </div>
</div>

<script>
  // ==================== ACTUAL MEON APPS (15 apps) ====================
  const logoMapping = {

    "deep-focus": "https://i.ibb.co/204QYyVF/file-00000000c6707243af95f3105457c8b5.png",
    "data-vision": "https://i.ibb.co/NfCgDtT/file-00000000b57072438b98c6777ee7804e.png",
    "insight": "https://i.ibb.co/FR12Cbh/file-0000000003947246bfbd3e5ce474edd4.png",
    "rider-app": "https://i.ibb.co/Myk5kQFw/file-00000000888871f482a587c6a8d8847e.png",
    "guard-ai": "https://i.ibb.co/GQWZnykb/file-00000000379c71f4a01216ae10901877.png",
    "clients-hub": "https://i.ibb.co/ynD8T6th/file-00000000225471f4a1e44c664b9fd555.png",
    "cv-maker": "https://i.ibb.co/cSvLqcLX/file-00000000d5e071f4ba22a75f0817c803.png",
    "smart-duka": "https://i.ibb.co/nMBpS9WF/file-00000000826c71f48191fe3abb47a9d3.png",
    "agriculture": "https://i.ibb.co/xqM1JCWG/file-000000004a8071f480fdac11e406f891.png",
    "luminor-studio": "https://i.ibb.co/3959zVpj/file-000000008d8c71f49373b77a647572d6.png",
    "matatu-booking": "https://i.ibb.co/392pGZq9/file-0000000093b871f4b17cbccefe4d7bc7.png",
    "home-search": "https://i.ibb.co/N6jb2762/file-000000004c4871f49ca1cb9d0d2c1de4.png",
    "school-360": "https://i.ibb.co/rK4xNYFs/file-000000001ee871f4b8169a28703091b7.png",
    "kanisa-launcher": "https://i.ibb.co/7NrfmcHn/file-0000000081ac72468a2293c64472a4fc.png"
  };
  const screenshotUrls = [
    "https://i.ibb.co/JPVGw2p/Screenshot-20260611-024707-Chrome.jpg","https://i.ibb.co/8D8qyBGg/Screenshot-20260611-024637-Chrome.jpg","https://i.ibb.co/4RBfvvjm/Screenshot-20260611-024610-Chrome.jpg","https://i.ibb.co/4g42CZRx/Screenshot-20260611-024506-Chrome.jpg","https://i.ibb.co/cSpb60gC/Screenshot-20260611-024412-Chrome.jpg","https://i.ibb.co/cXsqXjsx/Screenshot-20260611-024344-Chrome.jpg","https://i.ibb.co/FLFnBh7g/Screenshot-20260611-024154-Chrome.jpg","https://i.ibb.co/XxkBRrJ9/Screenshot-20260611-024111-Chrome.jpg","https://i.ibb.co/rWr1ZWW/Screenshot-20260611-024047-Chrome.jpg","https://i.ibb.co/B5wFG9Yh/Screenshot-20260611-023951-Chrome.jpg","https://i.ibb.co/RkcNfHh6/Screenshot-20260611-023843-Chrome.jpg","https://i.ibb.co/vF5TLKP/Screenshot-20260611-023556-Chrome.jpg","https://i.ibb.co/R4TPbxsB/Screenshot-20260611-023537-Chrome.jpg","https://i.ibb.co/PGT1M64C/Screenshot-20260611-023518-Chrome.jpg"
  ];

  const appList = [
    { id: "maji-gas", name: "Maji Gas Delivery", shortDesc: "Cooking gas & water delivery on demand", category: "Utilities", price: 0, isFree: true, rating: 4.6, ratingCount: 234, downloads: 12540, version: "2.1.0", features: ["Real-time tracking", "Scheduled deliveries"], description: "Fast, reliable LPG and water delivery." },
    { id: "deep-focus", name: "Deep Focus", shortDesc: "Pomodoro timer & distraction blocker", category: "Productivity", price: 4.99, isFree: false, rating: 4.8, ratingCount: 1890, downloads: 45200, version: "3.0.2", features: ["Pomodoro timer", "Website blocker"], description: "Boost productivity with focus tools." },
    { id: "guard-ai", name: "Guard AI", shortDesc: "AI cybersecurity protection", category: "AI Tools", price: 9.99, isFree: false, rating: 4.9, ratingCount: 523, downloads: 18730, version: "1.5.0", features: ["Threat detection", "VPN"], description: "Next-gen AI shield." },
    { id: "data-vision", name: "Data Vision", shortDesc: "AI business intelligence", category: "Analytics", price: 19.99, isFree: false, rating: 4.7, ratingCount: 312, downloads: 9800, version: "4.2.1", features: ["Dashboards", "AI predictions"], description: "Turn data into insights." },
    { id: "rider-app", name: "Rider App", shortDesc: "Logistics & delivery platform", category: "Transport", price: 0, isFree: true, rating: 4.5, ratingCount: 892, downloads: 67300, version: "2.3.0", features: ["Route optimization", "Live tracking"], description: "Complete solution for riders." },
    { id: "insight", name: "Insight", shortDesc: "Customer analytics platform", category: "Analytics", price: 29.99, isFree: false, rating: 4.6, ratingCount: 178, downloads: 5400, version: "1.8.0", features: ["Segmentation", "Predictive models"], description: "Deep customer intelligence." },
    { id: "clients-hub", name: "Clients Hub", shortDesc: "CRM for modern business", category: "CRM", price: 14.99, isFree: false, rating: 4.4, ratingCount: 421, downloads: 12400, version: "3.1.0", features: ["Contact mgmt", "Deal tracking"], description: "Grow relationships." },
    { id: "smart-duka", name: "Smart Duka", shortDesc: "Retail management system", category: "Business", price: 9.99, isFree: false, rating: 4.7, ratingCount: 563, downloads: 28900, version: "2.0.0", features: ["Inventory", "POS"], description: "Modern POS for small shops." },
    { id: "agriculture", name: "Agriculture", shortDesc: "Smart farming solution", category: "Agriculture", price: 0, isFree: true, rating: 4.3, ratingCount: 197, downloads: 8100, version: "1.4.0", features: ["Crop monitor", "Weather"], description: "Empower farmers." },
    { id: "luminor-studio", name: "Luminor Studio", shortDesc: "AI photo & video editing", category: "Design", price: 12.99, isFree: false, rating: 4.9, ratingCount: 734, downloads: 34200, version: "5.0.1", features: ["AI enhancement", "4K export"], description: "Creative suite for pros." },
    { id: "cv-maker", name: "CV Maker", shortDesc: "Professional resume builder", category: "Productivity", price: 0, isFree: true, rating: 4.6, ratingCount: 1280, downloads: 98700, version: "1.9.0", features: ["Templates", "PDF export"], description: "Create winning resumes." },
    { id: "matatu-booking", name: "Matatu Booking", shortDesc: "Public transport booking", category: "Transport", price: 0, isFree: true, rating: 4.5, ratingCount: 567, downloads: 45300, version: "2.2.0", features: ["Real-time tracking", "Digital tickets"], description: "Book matatus." },
    { id: "home-search", name: "Home Search", shortDesc: "Real estate marketplace", category: "Real Estate", price: 0, isFree: true, rating: 4.4, ratingCount: 398, downloads: 22500, version: "3.3.0", features: ["Property search", "Virtual tours"], description: "Find dream home." },
    { id: "school-360", name: "School 360", shortDesc: "School management system", category: "Education", price: 49.99, isFree: false, rating: 4.8, ratingCount: 245, downloads: 6700, version: "4.1.0", features: ["Student records", "Fee mgmt"], description: "Complete school ERP." },
    { id: "kanisa-launcher", name: "Kanisa Launcher", shortDesc: "Church management", category: "Religion", price: 0, isFree: true, rating: 4.7, ratingCount: 156, downloads: 5300, version: "1.2.0", features: ["Events", "Giving platform"], description: "Digital tools for ministry." }
  ];
  appList.forEach((app, idx) => { app.logoUrl = logoMapping[app.id]; app.screenshots = [screenshotUrls[idx % screenshotUrls.length]]; });
  function fallbackLogo(appId, size=60){ return `https://ui-avatars.com/api/?background=8b5cf6&color=fff&name=${appId.slice(0,2)}&size=${size}&rounded=true`; }
  function appLogoImg(app, sizeClass="w-14 h-14", px=56){ return `<img src="${app.logoUrl || fallbackLogo(app.id, px)}" class="${sizeClass} rounded-2xl shadow-lg object-cover border border-purple-500/30" onerror="this.src='${fallbackLogo(app.id, px)}'">`; }

  // --- state (full original workflow) ---
  let currentUser = JSON.parse(localStorage.getItem("meonUser")) || null;
  let activeView = "home", selectedApp = null, searchQuery = "", activeCategoryFilter = "";
  let userFavorites = JSON.parse(localStorage.getItem("meonFavorites")) || [];
  let userDownloads = JSON.parse(localStorage.getItem("meonDownloads")) || [];
  let reviewsData = JSON.parse(localStorage.getItem("meonReviews")) || {};

  function saveState() { if(currentUser) localStorage.setItem("meonUser", JSON.stringify(currentUser)); else localStorage.removeItem("meonUser"); localStorage.setItem("meonFavorites", JSON.stringify(userFavorites)); localStorage.setItem("meonDownloads", JSON.stringify(userDownloads)); localStorage.setItem("meonReviews", JSON.stringify(reviewsData)); }
  function showToast(msg, type="success") { const cont=document.getElementById("toastContainer"); const toast=document.createElement("div"); toast.className=`toast flex items-center gap-2`; toast.innerHTML=`<i data-lucide="${type==='success'?'check-circle':'alert-circle'}" class="w-5 h-5 text-purple-400"></i><span>${msg}</span>`; cont.appendChild(toast); if(window.lucide) lucide.createIcons(); setTimeout(()=>toast.remove(), 3800); }
  function loginUser(email, role="user"){ currentUser={id:Date.now(),email,name:email.split('@')[0],role}; saveState(); renderNav(); renderCurrentView(); showToast(`Welcome ${currentUser.name} to Meon`, "success");}
  function logout(){ currentUser=null; userFavorites=[]; userDownloads=[]; saveState(); renderNav(); renderCurrentView(); showToast("Logged out");}
  function toggleFavorite(appId){ if(!currentUser){ showToast("Sign in to save favorites","error"); return false; } const idx=userFavorites.indexOf(appId); idx===-1? userFavorites.push(appId):userFavorites.splice(idx,1); saveState(); renderCurrentView(); showToast(idx===-1?"Added to favorites":"Removed","success"); return true;}
  async function initiateMpesaPayment(phone,amount,ref,appName){ return new Promise((resolve)=>{ showToast(`📱 STK push to ${phone} for KES ${amount}. Check your phone.`,"info"); setTimeout(()=>{ showToast(`✅ Payment of KES ${amount} for ${appName} successful!`,"success"); resolve(true); },2500); });}
  let currentPaymentApp=null;
  function showMpesaPaymentModal(app){ if(!currentUser){ showToast("Login to purchase","error"); return; } currentPaymentApp=app; document.getElementById("mpesaAppName").innerText=`${app.name} - KES ${app.price}`; document.getElementById("mpesaAmount").value=app.price; document.getElementById("mpesaPhone").value=""; document.getElementById("mpesaModal").classList.remove("hidden");}
  async function confirmMpesaPayment(){ const phone=document.getElementById("mpesaPhone").value.trim(); if(!phone){ showToast("Enter M-Pesa number","error"); return; } if(!currentPaymentApp) return; document.getElementById("mpesaModal").classList.add("hidden"); const success=await initiateMpesaPayment(phone,currentPaymentApp.price,`MEON_${currentPaymentApp.id}`,currentPaymentApp.name); if(success){ if(!userDownloads.find(d=>d.appId===currentPaymentApp.id)){ userDownloads.push({appId:currentPaymentApp.id, downloadedAt:new Date().toISOString(), version:currentPaymentApp.version}); currentPaymentApp.downloads+=1; saveState(); showToast(`${currentPaymentApp.name} added to library`,"success"); renderCurrentView(); } } currentPaymentApp=null;}
  function downloadApp(app){ if(!currentUser){ showToast("Please login","error"); return; } if(!app.isFree){ showMpesaPaymentModal(app); return; } if(!userDownloads.find(d=>d.appId===app.id)){ userDownloads.push({appId:app.id, downloadedAt:new Date().toISOString(), version:app.version}); app.downloads+=1; saveState(); showToast(`Downloaded ${app.name}`,"success"); renderCurrentView(); } else showToast("Already installed","info");}
  function submitReview(appId, rating, content){ if(!currentUser) return false; if(!reviewsData[appId]) reviewsData[appId]=[]; reviewsData[appId].push({userId:currentUser.id, user:currentUser.name, rating, content, date:new Date().toISOString()}); const allRatings=reviewsData[appId].map(r=>r.rating); const avg=allRatings.reduce((a,b)=>a+b,0)/allRatings.length; const appObj=appList.find(a=>a.id===appId); if(appObj){ appObj.rating=parseFloat(avg.toFixed(1)); appObj.ratingCount=allRatings.length; } saveState(); showToast("Review submitted","success"); renderCurrentView(); return true;}
  function getFilteredApps(){ let filtered=[...appList]; if(searchQuery){ const q=searchQuery.toLowerCase(); filtered=filtered.filter(app=>app.name.toLowerCase().includes(q)||app.shortDesc.toLowerCase().includes(q)||app.category.toLowerCase().includes(q)); } if(activeCategoryFilter) filtered=filtered.filter(app=>app.category.toLowerCase()===activeCategoryFilter.toLowerCase()); return filtered; }

  // Updated Hero Section with the new image from i.ibb.co
  function renderHome() {
    const filtered = getFilteredApps();
    const featured = ["guard-ai","deep-focus","luminor-studio"].map(id=>appList.find(a=>a.id===id));
    const trending = [...filtered].sort((a,b)=>b.downloads-a.downloads).slice(0,6);
    const categories = ["All","AI Solutions","Business","Education","Agriculture","Transport","Creativity","Productivity","Analytics"];
    const catMap = {"AI Solutions":"ai tools","Business":"business","Education":"education","Agriculture":"agriculture","Transport":"transport","Creativity":"design","Productivity":"productivity","Analytics":"analytics"};
    return `
      <div class="space-y-10">
        <!-- Hero Section with new image from i.ibb.co -->
        <div class="relative overflow-hidden rounded-3xl glass-card p-8 md:p-10 flex flex-wrap items-center gap-8">
          <div class="hero-glow top-0 -right-40"></div>
          <div class="hero-glow bottom-0 left-20 opacity-40"></div>
          <div class="flex-1 min-w-[280px] z-10">
            <div class="text-purple-300 text-sm font-mono tracking-wider">MEON MARKETPLACE</div>
            <h1 class="text-5xl md:text-7xl font-black mt-2 tracking-tight">LogicDriven. <span class="gradient-text">FutureProven.</span></h1>
            <p class="text-gray-300 max-w-xl mt-3 text-lg">Building intelligent solutions for a smarter tomorrow. 15+ applications, AI-powered.</p>
            <div class="flex gap-4 mt-6">
              <button id="exploreBtn" class="btn-primary px-6 py-3 rounded-xl font-bold shadow-lg">Explore All Apps →</button>
              <button id="devHeroBtn" class="border border-purple-400/40 px-6 py-3 rounded-xl backdrop-blur-sm hover:bg-white/10">Become a Developer</button>
            </div>
          </div>
          <!-- Display the image provided by the user -->
          <div class="flex-1 flex justify-center z-10">
            <img src="https://i.ibb.co/kgyWPLFs/1781207309398.png" alt="Meon Marketplace Hero Visual" class="max-w-full h-auto rounded-2xl shadow-2xl border border-purple-500/30 hover:scale-105 transition duration-300" style="max-height: 280px; object-fit: contain;">
          </div>
          <!-- Stats summary -->
          <div class="w-full grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 z-10">
            <div class="stats-glow rounded-2xl p-4 text-center"><div class="text-2xl font-bold">15+</div><div class="text-xs text-purple-300">Apps</div></div>
            <div class="stats-glow rounded-2xl p-4 text-center"><div class="text-2xl font-bold">500K+</div><div class="text-xs text-purple-300">Downloads</div></div>
            <div class="stats-glow rounded-2xl p-4 text-center"><div class="text-2xl font-bold">4.8★</div><div class="text-xs text-purple-300">Rating</div></div>
            <div class="stats-glow rounded-2xl p-4 text-center"><div class="text-2xl font-bold">24/7</div><div class="text-xs text-purple-300">Innovation</div></div>
          </div>
        </div>
        <!-- Search bar -->
        <div class="glass-panel rounded-2xl p-3 flex gap-3"><i data-lucide="search" class="text-purple-400"></i><input type="text" id="globalSearch" placeholder="Search apps, AI tools, business solutions..." class="w-full bg-transparent outline-none text-white" value="${searchQuery.replace(/"/g, '&quot;')}"></div>
        <!-- Category filters -->
        <div class="flex flex-wrap gap-3 justify-center">${categories.map(cat=>`<button data-cat="${catMap[cat] || (cat==='All'?'':cat.toLowerCase())}" class="category-chip ${(activeCategoryFilter=== (catMap[cat]||(cat==='All'?'':cat.toLowerCase()))) ? 'active' : ''}">${cat}</button>`).join('')}${activeCategoryFilter?`<button id="clearCat" class="bg-red-500/20 px-4 py-2 rounded-full text-sm">Clear ✕</button>`:""}</div>
        <!-- Featured apps row -->
        <div><h2 class="text-2xl font-bold flex gap-2 mb-4"><i data-lucide="zap" class="text-purple-400"></i> Featured Intelligence</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${featured.map(app=>appCard(app)).join('')}</div></div>
        <!-- Trending apps -->
        <div><h2 class="text-2xl font-bold flex gap-2 mb-4"><i data-lucide="trending-up" class="text-purple-400"></i> Trending on Meon</h2><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">${trending.map(app=>appCard(app)).join('')}</div></div>
      </div>
    `;
  }
  function appCard(app){
    const isFav = currentUser && userFavorites.includes(app.id);
    return `<div class="app-card p-5 cursor-pointer transition-all" onclick="window.showAppDetail('${app.id}')"><div class="flex gap-4"><div>${appLogoImg(app, "w-16 h-16",64)}</div><div class="flex-1"><h3 class="font-extrabold text-lg">${app.name}</h3><p class="text-gray-300 text-sm">${app.shortDesc}</p><div class="flex items-center gap-2 mt-1"><div class="flex text-yellow-400 text-xs">${'★'.repeat(Math.floor(app.rating))}${app.rating%1>=0.5?'½':''}</div><span class="text-xs text-gray-400">(${app.ratingCount})</span><span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full">${app.category}</span></div></div><button onclick="event.stopPropagation(); toggleFavorite('${app.id}')" class="text-pink-400"><i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-pink-500' : ''}"></i></button></div><div class="flex justify-between items-center mt-4"><span class="text-xs font-mono text-purple-300">${app.downloads.toLocaleString()} downloads</span><button onclick="event.stopPropagation(); downloadApp(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="bg-gradient-to-r from-purple-700 to-indigo-700 px-5 py-2 rounded-xl text-sm font-bold">${app.isFree ? 'Get · Free' : `Buy KES ${app.price}`}</button></div></div>`;
  }
  function renderAppDetail(){ if(!selectedApp) return renderHome(); const app=selectedApp; const revs=reviewsData[app.id]||[]; return `<div class="max-w-5xl mx-auto"><button onclick="window.backToHome()" class="flex items-center gap-1 text-purple-400 mb-5">&larr; Back to Marketplace</button><div class="glass-card p-7 rounded-3xl"><div class="flex flex-wrap gap-6"><div>${appLogoImg(app,"w-28 h-28",100)}</div><div><h1 class="text-4xl font-black">${app.name}</h1><p class="text-gray-300">${app.shortDesc}</p><div class="flex gap-4 mt-2"><span>⭐ ${app.rating} (${app.ratingCount})</span><span>📥 ${app.downloads.toLocaleString()}</span></div><div class="flex gap-3 mt-4"><button onclick="downloadApp(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="btn-primary px-8 py-2 rounded-xl font-bold">${app.isFree?'Download':'Buy KES '+app.price}</button><button onclick="toggleFavorite('${app.id}')" class="border border-purple-500 px-5 py-2 rounded-xl">❤️ Favorite</button></div></div></div><div class="mt-6"><h2 class="text-xl font-bold">Description</h2><p>${app.description}</p><ul class="list-disc pl-5 mt-2">${app.features.map(f=>`<li>${f}</li>`).join('')}</ul></div><div class="mt-6"><h2 class="text-xl font-bold">Screenshots</h2><div class="flex gap-3 overflow-x-auto">${app.screenshots.map(url=>`<img src="${url}" class="rounded-2xl h-40 w-auto object-cover border border-white/20">`).join('')}</div></div><div class="mt-8"><h2 class="text-xl font-bold">Rate & Review</h2><div id="reviewStars" class="flex gap-1 my-2"></div><textarea id="reviewText" rows="2" class="w-full bg-white/10 border border-purple-500/30 rounded-xl p-3"></textarea><button id="submitReviewBtn" class="mt-2 bg-purple-600 px-5 py-2 rounded-xl">Submit</button><div class="mt-6 space-y-4">${revs.map(r=>`<div class="border-b border-white/10 pb-3"><div class="font-bold">${r.user}</div><div class="text-yellow-400">${'★'.repeat(r.rating)}</div><p>${r.content}</p><small>${new Date(r.date).toLocaleDateString()}</small></div>`).join('')}</div></div></div></div>`;}
  function renderDashboard(){ if(!currentUser) return `<div class="text-center py-20 glass-card p-8">🔐 Sign in to access Meon Workspace</div>`; const downloaded=appList.filter(a=>userDownloads.some(d=>d.appId===a.id)); const favs=appList.filter(a=>userFavorites.includes(a.id)); return `<div class="glass-card p-8"><h1 class="text-3xl font-bold">👤 My Dashboard</h1><div class="grid md:grid-cols-2 gap-7 mt-7"><div><h2 class="text-xl font-bold">📦 Installed (${downloaded.length})</h2>${downloaded.map(a=>`<div class="flex gap-3 items-center mt-3 p-2 glass-card">${appLogoImg(a,"w-10 h-10",40)}<span>${a.name}</span></div>`).join('')||"<p>No apps installed</p>"}</div><div><h2 class="text-xl font-bold">❤️ Favorites</h2>${favs.map(a=>`<div class="flex gap-3 mt-3">${appLogoImg(a,"w-10 h-10",40)}<span>${a.name}</span></div>`).join('')}</div></div></div>`;}
  function renderAdmin(){ if(!currentUser||!['admin','super_admin'].includes(currentUser.role)) return `<div class="text-center py-20">Admin Access Only</div>`; return `<div class="glass-card p-7"><h1 class="text-3xl font-bold">Admin Console</h1><div class="grid grid-cols-3 gap-5 mt-6"><div class="stats-glow p-4 rounded-2xl"><div class="text-2xl font-black">1.2k+</div><div>Users</div></div><div class="stats-glow p-4 rounded-2xl"><div class="text-2xl font-black">${appList.reduce((s,a)=>s+a.downloads,0).toLocaleString()}</div><div>Downloads</div></div><div class="stats-glow p-4 rounded-2xl"><div class="text-2xl font-black">$24.1k</div><div>Revenue</div></div></div><div class="mt-6"><h2 class="font-bold">App Management</h2>${appList.map(a=>`<div class="flex justify-between border-b border-white/10 py-2"><span>${a.name}</span><button class="btn-primary px-3 py-1 rounded-lg text-xs" onclick="alert('Manage ${a.name} (demo)')">Edit</button></div>`).join('')}</div></div>`;}
  function renderDeveloper(){ if(!currentUser||currentUser.role!=='developer') return `<div class="text-center py-20">Developer Hub</div>`; return `<div class="glass-card p-7"><h1 class="text-3xl font-bold">🛠️ Developer Hub</h1><p>Analytics & submissions</p><div class="mt-5">${appList.slice(0,5).map(a=>`<div class="flex justify-between"><span>${a.name}</span><span>${a.downloads} downloads</span></div>`).join('')}</div><button class="mt-6 btn-primary px-5 py-2 rounded-xl">+ Submit New Version</button></div>`;}
  function renderCurrentView(){ const container=document.getElementById("mainContent"); if(!container) return; if(selectedApp) container.innerHTML=renderAppDetail(); else if(activeView==="home"){ container.innerHTML=renderHome(); setTimeout(()=>{ document.getElementById("globalSearch")?.addEventListener("input",e=>{ searchQuery=e.target.value; renderCurrentView(); }); document.querySelectorAll(".category-chip").forEach(ch=>{ ch.addEventListener("click",()=>{ activeCategoryFilter=ch.getAttribute("data-cat")||""; renderCurrentView(); }); }); const clear=document.getElementById("clearCat"); if(clear) clear.addEventListener("click",()=>{ activeCategoryFilter=""; renderCurrentView(); }); document.getElementById("exploreBtn")?.addEventListener("click",()=>window.scrollTo({top:800,behavior:"smooth"})); document.getElementById("devHeroBtn")?.addEventListener("click",()=>{ if(!currentUser) showToast("Login first","error"); else { activeView="developer"; renderCurrentView(); } }); },50); } else if(activeView==="dashboard") container.innerHTML=renderDashboard(); else if(activeView==="admin") container.innerHTML=renderAdmin(); else if(activeView==="developer") container.innerHTML=renderDeveloper(); if(window.lucide) lucide.createIcons(); if(selectedApp&&document.getElementById("reviewStars")){ let ratingVal=0; const starDiv=document.getElementById("reviewStars"); starDiv.innerHTML=""; for(let i=1;i<=5;i++){ let star=document.createElement("i"); star.setAttribute("data-lucide","star"); star.className="w-6 h-6 cursor-pointer rating-star text-gray-400 hover:text-yellow-400"; star.onclick=()=>{ratingVal=i; document.querySelectorAll("#reviewStars i").forEach((s,idx)=>s.style.fill=idx<i?"#facc15":"none");}; starDiv.appendChild(star);} if(window.lucide) lucide.createIcons(); document.getElementById("submitReviewBtn")?.addEventListener("click",()=>{ const txt=document.getElementById("reviewText").value; if(ratingVal&&txt) submitReview(selectedApp.id,ratingVal,txt); else showToast("Provide rating & comment","error");}); } }
  function renderNav(){ const authDiv=document.getElementById("authSection"); if(!authDiv) return; if(currentUser){ authDiv.innerHTML=`<span class="text-sm hidden sm:inline">${currentUser.email}</span><button id="logoutBtn" class="bg-red-600/80 px-4 py-1.5 rounded-xl text-sm">Logout</button>`; document.getElementById("logoutBtn")?.addEventListener("click",logout); const adminBtn=document.getElementById("adminNavBtn"),devBtn=document.getElementById("devNavBtn"); if(currentUser.role==="admin") adminBtn?.classList.remove("hidden"); else adminBtn?.classList.add("hidden"); if(currentUser.role==="developer") devBtn?.classList.remove("hidden"); else devBtn?.classList.add("hidden"); } else { authDiv.innerHTML=`<button id="showLoginModalBtn" class="bg-purple-600/80 px-5 py-1.5 rounded-xl text-sm">Sign In</button>`; document.getElementById("showLoginModalBtn")?.addEventListener("click",()=>{ const modal=document.createElement("div"); modal.className="fixed inset-0 bg-black/70 flex items-center justify-center z-50"; modal.innerHTML=`<div class="bg-[#0a0f1f] rounded-3xl p-7 w-96 border border-purple-500/40"><h2 class="text-2xl font-bold">Meon Access</h2><input id="loginEmailDemo" placeholder="Email" class="w-full mt-4 p-3 rounded-xl bg-white/10 border"><div class="flex gap-3 mt-5"><button id="demoLoginBtn" class="flex-1 btn-primary py-2 rounded-xl">Login</button><button id="demoAdminAccessBtn" class="flex-1 bg-purple-800 py-2 rounded-xl">Admin Demo</button><button id="demoDevAccessBtn" class="flex-1 bg-amber-700 py-2 rounded-xl">Dev Demo</button></div><button id="closeAuthModal" class="mt-4 text-gray-400 text-sm">Cancel</button></div>`; document.body.appendChild(modal); document.getElementById("demoLoginBtn")?.addEventListener("click",()=>{ const email=document.getElementById("loginEmailDemo").value||"user@meon.com"; loginUser(email,"user"); modal.remove();}); document.getElementById("demoAdminAccessBtn")?.addEventListener("click",()=>{ loginUser("admin@meon.com","admin"); modal.remove();}); document.getElementById("demoDevAccessBtn")?.addEventListener("click",()=>{ loginUser("dev@meon.com","developer"); modal.remove();}); document.getElementById("closeAuthModal")?.addEventListener("click",()=>modal.remove()); }); document.getElementById("adminNavBtn")?.classList.add("hidden"); document.getElementById("devNavBtn")?.classList.add("hidden"); } if(window.lucide) lucide.createIcons(); }
  window.showAppDetail=(id)=>{ selectedApp=appList.find(a=>a.id===id); renderCurrentView(); };
  window.backToHome=()=>{ selectedApp=null; renderCurrentView(); };
  document.querySelectorAll(".nav-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ const view=btn.getAttribute("data-nav"); if(view){ activeView=view; selectedApp=null; renderCurrentView(); } document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("border-purple-500","text-purple-300")); btn.classList.add("border-purple-500","text-purple-300"); }); });
  document.getElementById("mpesaConfirmBtn")?.addEventListener("click",confirmMpesaPayment);
  document.getElementById("mpesaCancelBtn")?.addEventListener("click",()=>document.getElementById("mpesaModal").classList.add("hidden"));
  renderNav(); renderCurrentView();
  window.toggleFavorite=toggleFavorite; window.downloadApp=downloadApp;
</script>
</body>
