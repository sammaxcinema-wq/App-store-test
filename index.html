            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => {
                console.log('[SW] Caching app shell');
                return cache.addAll(urlsToCache).catch((err) => {
                  console.warn('[SW] Some assets failed to cache:', err);
                });
              }).then(() => {
                return self.skipWaiting();
              })
            );
          });

            console.log('[SW] Activating...');
            event.waitUntil(
              caches.keys().then((cacheNames) => {
                return Promise.all(
                  cacheNames.map((cache) => {
                    if (cache !== CACHE_NAME) {

                      return caches.delete(cache);
                    }
                  })

              })

                    caches.open(CACHE_NAME).then((cache) => {

                      } catch (e) {}

    let deferredPrompt = null;
    let pwaBannerDismissed = false;
    let pwaBannerDismissTime = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('[PWA] Install prompt available');

      const dismissTime = localStorage.getItem('meonPwaBannerDismissTime');
      if (dismissTime) {
        const hoursSince = (Date.now() - parseInt(dismissTime)) / (1000 * 60 * 60);
        if (hoursSince < 48) {
          pwaBannerDismissed = true;
        } else {
          localStorage.removeItem('meonPwaBannerDismissTime');
          pwaBannerDismissed = false;
        }
      }

      if (!pwaBannerDismissed) {
        setTimeout(() => {
          document.getElementById('pwaInstallBanner')?.classList.add('show');
        }, 1500);
      }

      document.getElementById('headerInstallBtn')?.classList.remove('hidden');
    });

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App installed successfully!');
      deferredPrompt = null;
      document.getElementById('pwaInstallBanner')?.classList.remove('show');
      document.getElementById('headerInstallBtn')?.classList.add('hidden');
      showToast('🎉 Meon installed! Launch from your home screen.', 'success');
    });

    document.addEventListener('DOMContentLoaded', () => {
      const installBannerBtn = document.getElementById('pwaInstallBtn');
      const dismissBannerBtn = document.getElementById('pwaDismissBtn');
      const headerInstallBtn = document.getElementById('headerInstallBtn');

      function triggerInstall() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('[PWA] User accepted install');
            } else {
              console.log('[PWA] User dismissed install');
            }
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
            if (headerInstallBtn) headerInstallBtn.classList.add('hidden');
          });
        } else {
          showToast('Install option not available right now. Try refreshing.', 'info');
        }
      }

      if (installBannerBtn) {
        installBannerBtn.addEventListener('click', triggerInstall);
      }

      if (dismissBannerBtn) {
        dismissBannerBtn.addEventListener('click', () => {
          document.getElementById('pwaInstallBanner')?.classList.remove('show');
          pwaBannerDismissed = true;
          localStorage.setItem('meonPwaBannerDismissTime', Date.now().toString());
          if (headerInstallBtn && deferredPrompt) {
            headerInstallBtn.classList.remove('hidden');
          }
          showToast('You can install later from the header 📲', 'info');
        });
      }

      if (headerInstallBtn) {
        headerInstallBtn.addEventListener('click', triggerInstall);
      }
    });

    function appLogoImg(app, sizeClass = "w-16 h-16", pixelSize = 60) {
      const externalUrl = app.logoUrl;
      const fallbackSvg = generateFallbackSVG(app.id, pixelSize);
      if (!externalUrl) {
        return `<img src="${fallbackSvg}" class="${sizeClass} rounded-xl shadow object-cover" alt="${app.name}">`;
      }

    let reviewsData = JSON.parse(localStorage.getItem("meonReviews")) || {};

    function saveState() {
      if (currentUser) localStorage.setItem("meonUser", JSON.stringify(currentUser));
      else localStorage.removeItem("meonUser");
      localStorage.setItem("meonFavorites", JSON.stringify(userFavorites));
      localStorage.setItem("meonReviews", JSON.stringify(reviewsData));
    }

    function showToast(msg, type = "success") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className =
        `toast bg-white dark:bg-gray-800 shadow-lg rounded-xl px-4 py-3 border-l-4 ${type === "success" ? "border-green-500" : type === "error" ? "border-red-500" : "border-blue-500"} flex items-center gap-2`;
      toast.innerHTML =
        `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${msg}</span>`;
      container.appendChild(toast);
      if (window.lucide) lucide.createIcons();
      setTimeout(() => toast.remove(), 4000);
    }

    function loginUser(email, role = "user") {
      currentUser = { id: Date.now(), email, name: email.split('@')[0], role: role };
      saveState();
      renderNav();
      renderCurrentView();
      showToast(`Welcome to Meon, ${currentUser.name}!`, "success");
    }

    function logout() {
      currentUser = null;
      userFavorites = [];
      saveState();
      renderNav();
      renderCurrentView();
      showToast("Logged out", "success");
    }

    function toggleFavorite(appId) {
      if (!currentUser) { showToast("Sign in to save favorites", "error"); return false; }
      const idx = userFavorites.indexOf(appId);
      if (idx === -1) { userFavorites.push(appId);
        showToast("Added to favorites", "success"); } else { userFavorites.splice(idx, 1);
        showToast("Removed from favorites", "success"); }
      saveState();
      renderCurrentView();
      return true;
    }

    function openApp(app) {
      if (app.externalUrl) {
        window.open(app.externalUrl, '_blank');
        showToast(`Launching ${app.name}...`, "info");
      } else {
        showToast("No web link available for this app", "error");
      }
    }

    function submitReview(appId, rating, content) {
      if (!currentUser) { showToast("Login to review", "error"); return false; }
      if (!reviewsData[appId]) reviewsData[appId] = [];
      reviewsData[appId].push({ userId: currentUser.id, user: currentUser.name, rating, content,
        date: new Date().toISOString() });
      const allRatings = reviewsData[appId].map(r => r.rating);
      const avg = allRatings.reduce((a, b) => a + b, 0) / allRatings.length;
      const appObj = appList.find(a => a.id === appId);
      if (appObj) { appObj.rating = parseFloat(avg.toFixed(1));
        appObj.ratingCount = allRatings.length; }
      saveState();
      showToast("Review submitted", "success");
      renderCurrentView();
      return true;
    }

    function getFilteredApps() {
      let filtered = [...appList];
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(app => app.name.toLowerCase().includes(q) || app.shortDesc.toLowerCase().includes(q) ||
          app.category.toLowerCase().includes(q));
      }
      if (activeCategoryFilter) {
        filtered = filtered.filter(app => app.category.toLowerCase() === activeCategoryFilter.toLowerCase());
      }
      return filtered;
    }

                <p class="text-lg">Categories: <span class="font-bold text-purple-300">${new Set(appList.map(a=>a.category)).size}</span></p>
                <p class="text-lg">Total reviews: <span class="font-bold text-purple-300">${Object.values(reviewsData).reduce((acc, curr) => acc + curr.length, 0)}</span></p>
              </div>
            </div>
            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/10">
              <h2 class="text-xl font-bold text-white">⭐ Top Rated</h2>
              <ul class="mt-4 space-y-2 text-white">
                ${appList.sort((a,b)=>b.rating-a.rating).slice(0,5).map(a=>`<li class="flex justify-between items-center p-2 bg-white/5 rounded"><span>${a.name}</span><span class="text-yellow-400">${a.rating} ★</span></li>`).join('')}
              </ul>
            </div>
          </div>
          <div class="mt-6">
            <h2 class="text-xl font-bold text-white mb-4">App Management</h2>
            <div class="grid gap-2 max-h-96 overflow-y-auto">
              ${appList.map(a=>`<div class="flex justify-between items-center bg-white/10 backdrop-blur-lg p-3 rounded-lg border border-white/10">
                <span class="text-white">${a.name}</span>
                <button class="text-sm bg-purple-600 text-white px-3 py-1 rounded hover:bg-purple-700 transition" onclick="alert('Admin: Manage ${a.name} (demo)')">Edit</button>
              </div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderDeveloper() {
      if (!currentUser || currentUser.role !== 'developer')
        return `<div class="text-center py-12 text-white">Developer portal - Meon Partners only</div>`;
      return `<div class="developer-bg w-full max-w-6xl mx-auto">
        <div class="developer-content">
          <h1 class="text-3xl font-bold text-white mb-6">Meon Developer Hub</h1>
          <p class="text-purple-200 text-lg mb-6">Monitor your web apps listed on Meon Directory</p>
          <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/10">
            <h3 class="text-xl font-bold text-white mb-4">Your Apps Performance</h3>
            <div class="space-y-3">
              ${appList.slice(0,5).map(a=>`<div class="flex justify-between items-center p-3 bg-white/5 rounded-lg border border-white/10">
                <span class="text-white font-medium">${a.name}</span>
                <span class="text-yellow-400">Rating: ${a.rating} (${a.ratingCount} reviews)</span>
              </div>`).join('')}
            </div>
            <button class="mt-6 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition font-semibold">+ Submit New App</button>
          </div>
          <div class="mt-6 bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/10">
            <h3 class="text-xl font-bold text-white mb-4">📈 Analytics Overview</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div class="text-center p-4 bg-white/5 rounded-lg">
                <div class="text-2xl font-bold text-purple-300">${appList.length}</div>
                <div class="text-sm text-gray-300">Total Apps</div>
              </div>
              <div class="text-center p-4 bg-white/5 rounded-lg">
                <div class="text-2xl font-bold text-purple-300">${appList.filter(a => a.rating >= 4.5).length}</div>
                <div class="text-sm text-gray-300">High Rated</div>
              </div>
              <div class="text-center p-4 bg-white/5 rounded-lg">
                <div class="text-2xl font-bold text-purple-300">${new Set(appList.map(a=>a.category)).size}</div>
                <div class="text-sm text-gray-300">Categories</div>
              </div>
              <div class="text-center p-4 bg-white/5 rounded-lg">
                <div class="text-2xl font-bold text-purple-300">${Object.values(reviewsData).reduce((acc, curr) => acc + curr.length, 0)}</div>
                <div class="text-sm text-gray-300">Total Reviews</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderHome() {
      const filteredApps = getFilteredApps();
      const featuredIds = ["spark-connect", "guard-ai", "deep-focus", "luminor-studio", "maji-gas", "clients-hub",
        "meal-planner-pro", "finance-eight", "sacco-sable", "cbo-three", "gym-nine"
      ];
      const featured = filteredApps.filter(a => featuredIds.includes(a.id));
      const trending = [...filteredApps].sort((a, b) => b.rating - a.rating).slice(0, 6);
      const newReleases = [...filteredApps].reverse().slice(0, 6);
      const categoryItems = [
        { name: "Social", gradient: "from-pink-600 to-rose-600", filter: "social" },
        { name: "AI Tools", gradient: "from-purple-600 to-violet-600", filter: "ai tools" },
        { name: "Business", gradient: "from-blue-600 to-cyan-600", filter: "business" },
        { name: "Education", gradient: "from-green-600 to-emerald-600", filter: "education" },
        { name: "Agriculture", gradient: "from-orange-600 to-amber-600", filter: "agriculture" },
        { name: "Transport", gradient: "from-red-600 to-pink-600", filter: "transport" },
        { name: "Design", gradient: "from-indigo-600 to-purple-600", filter: "design" },
        { name: "Utilities", gradient: "from-teal-600 to-cyan-600", filter: "utilities" },
        { name: "Health & Wellness", gradient: "from-green-600 to-lime-600", filter: "health & wellness" },
        { name: "Finance", gradient: "from-emerald-600 to-teal-600", filter: "finance" }
      ];

      const mainBgHtml = `<div class="main-bg w-full max-w-6xl mx-auto">
        <div class="main-content">`;

      const heroHtml =
        `<div class="hero-bg w-full mx-auto overflow-hidden p-6 md:p-8 rounded-3xl border border-purple-900/40 text-white shadow-xl mb-8 min-h-[300px] flex items-center">
          <div class="hero-content flex flex-col md:flex-row justify-between items-center gap-6 w-full">
            <div>
              <h1 class="text-4xl md:text-5xl font-extrabold">Meon Directory</h1>
              <p class="text-purple-200 mt-2">Launch web apps instantly · No payments · No downloads</p>
              <div class="flex gap-4 mt-4">
                <button id="exploreMarketplaceBtn" class="bg-purple-600 px-5 py-2 rounded-full text-sm font-semibold hover:bg-purple-500 transition">Explore Apps →</button>
                <button id="becomeDevBtn" class="border border-purple-400 px-5 py-2 rounded-full text-sm hover:bg-purple-500/20 transition">Become a Developer</button>
              </div>
            </div>
            <div class="bg-white/10 backdrop-blur rounded-2xl p-4 text-center">
              <div class="text-3xl font-bold">${appList.length}+</div>
              <div class="text-xs">Web Apps</div>
            </div>
          </div>
        </div>`;

      const categoriesHtml = `<div class="categories-bg w-full mx-auto mb-8">
        <div class="categories-content">
          <h2 class="text-2xl font-bold text-white mb-4">Categories</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
            ${categoryItems.map(cat => `<div class="rounded-xl bg-gradient-to-r ${cat.gradient} text-white p-3 text-center text-sm font-semibold cursor-pointer hover:scale-105 transition category-chip" data-category="${cat.filter}">${cat.name}</div>`).join('')}
            ${activeCategoryFilter ? `<div class="rounded-xl bg-gray-500 text-white p-3 text-center cursor-pointer" id="clearCategoryBtn">Clear ✕</div>` : ""}
          </div>
        </div>
      </div>`;

      const searchHtml = `<div class="bg-white/10 dark:bg-gray-800/50 rounded-2xl p-4 flex items-center gap-3 mb-8">
        <i data-lucide="search" class="text-white"></i>
        <input type="text" id="globalSearchInput" placeholder="Search apps by name, category..." class="w-full bg-transparent outline-none text-white placeholder-gray-300" value="${searchQuery.replace(/"/g, '&quot;')}">
      </div>`;

      const featuredHtml = `<div class="featured-bg w-full mx-auto mb-8">
        <div class="featured-content">
          <h2 class="text-2xl font-bold text-white mb-4">⭐ Featured</h2>
          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${featured.map(app=>appCard(app)).join('')}</div>
        </div>
      </div>`;

      const topratedHtml = `<div class="toprated-bg w-full mx-auto mb-8">
        <div class="toprated-content">
          <h2 class="text-2xl font-bold text-white mb-4">🔥 Top Rated</h2>
          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${trending.map(app=>appCard(app)).join('')}</div>
        </div>
      </div>`;

      const recentHtml = `<div class="recent-bg w-full mx-auto mb-8">
        <div class="recent-content">
          <h2 class="text-2xl font-bold text-white mb-4">🆕 Recently Added</h2>
          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${newReleases.map(app=>appCard(app)).join('')}</div>
        </div>
      </div>`;

      const closeHtml = `</div></div>`;

      return `${mainBgHtml}${heroHtml}${categoriesHtml}${searchHtml}${featuredHtml}${topratedHtml}${recentHtml}${closeHtml}`;
    }

    function renderCurrentView() {
      const container = document.getElementById("mainContent");
      if (!container) return;
      if (selectedApp) { container.innerHTML = renderAppDetail(); } else if (activeView === "home") { container.innerHTML =
          renderHome();
        setTimeout(() => {
          const searchInput = document.getElementById("globalSearchInput");
          if (searchInput) {
            searchInput.addEventListener("input", (e) => { searchQuery = e.target.value;
              renderCurrentView(); });
          }
          document.querySelectorAll(".category-chip").forEach(c => c.addEventListener("click", () => {
            activeCategoryFilter = c.dataset.category;
            renderCurrentView();
          }));
          document.getElementById("clearCategoryBtn")?.addEventListener("click", () => { activeCategoryFilter = "";
            renderCurrentView(); });
          document.getElementById("exploreMarketplaceBtn")?.addEventListener("click", () => document.querySelector(
            ".grid.sm\\:grid-cols-2")?.scrollIntoView({ behavior: "smooth" }));
          document.getElementById("becomeDevBtn")?.addEventListener("click", () => { if (!currentUser) showToast(
              "Please login first", "error");
            else { activeView = "developer";
              renderCurrentView(); } });
        }, 50); } else if (activeView === "dashboard") container.innerHTML = renderDashboard();
      else if (activeView === "att") container.innerHTML = renderATT();
      else if (activeView === "admin") container.innerHTML = renderAdmin();
      else if (activeView === "developer") container.innerHTML = renderDeveloper();
      if (window.lucide) lucide.createIcons();
      if (selectedApp && document.getElementById("reviewStars")) {
        let ratingVal = 0;
        const starDiv = document.getElementById("reviewStars");
        starDiv.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
          let star = document.createElement('i');
          star.setAttribute('data-lucide', 'star');
          star.className = 'w-6 h-6 cursor-pointer rating-star';
          star.onclick = () => { ratingVal = i;
            document.querySelectorAll('#reviewStars i').forEach((s, idx) => s.style.fill = idx < i ? '#facc15' :
              'none'); };
          starDiv.appendChild(star);
        }
        lucide.createIcons();
        document.getElementById("submitReviewBtn")?.addEventListener("click", () => {
          const txt = document.getElementById("reviewText").value;
          if (ratingVal && txt) submitReview(selectedApp.id, ratingVal, txt);
          else showToast("Please provide rating and comment", "error");
        });
      }
    }

    // Navigation & theme init
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const view = btn.getAttribute("data-nav");
        if (view) { activeView = view;
          selectedApp = null;
          renderCurrentView(); }
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("border-purple-600",
          "text-purple-600"));
        btn.classList.add("border-purple-600", "text-purple-600");
      });
    });

    function renderNav() {
      const authDiv = document.getElementById("authSection");
      if (!authDiv) return;
      if (currentUser) {
        authDiv.innerHTML =
          `<span class="text-sm hidden sm:inline text-gray-700 dark:text-gray-300">${currentUser.email}</span><button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm transition">Logout</button>`;
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        document.getElementById("adminNavBtn")?.classList.toggle("hidden", currentUser.role !== 'admin' && currentUser
          .role !== 'super_admin');
        document.getElementById("devNavBtn")?.classList.toggle("hidden", currentUser.role !== 'developer');
      } else {
        authDiv.innerHTML =
          `<button id="showLoginModalBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded-lg text-sm transition">Sign In</button>`;
        document.getElementById("showLoginModalBtn")?.addEventListener("click", () => showAuthModal());
        document.getElementById("adminNavBtn")?.classList.add("hidden");
        document.getElementById("devNavBtn")?.classList.add("hidden");
      }
      lucide.createIcons();
    }

    function showAuthModal() {
      const modalHtml =
        `<div id="authModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-full max-w-md"><h2 class="text-2xl font-bold mb-4">Meon Account</h2><input type="email" id="loginEmail" placeholder="Email" class="w-full p-2 border rounded-lg dark:bg-gray-700 mb-3"><input type="password" id="loginPassword" placeholder="Password (any)" class="w-full p-2 border rounded-lg dark:bg-gray-700 mb-4"><div class="flex gap-2 mb-3"><button id="loginEmailBtn" class="flex-1 bg-purple-600 text-white py-2 rounded-lg">Login</button><button id="registerBtn" class="flex-1 bg-green-600 text-white py-2 rounded-lg">Sign Up</button></div><button id="demoAdminBtn" class="w-full bg-purple-100 dark:bg-purple-900 py-2 rounded-lg mb-2">Demo Admin Access</button><button id="demoDevBtn" class="w-full bg-amber-100 dark:bg-amber-900 py-2 rounded-lg">Demo Developer Access</button><button id="closeModal" class="w-full mt-3 text-gray-500">Cancel</button></div></div>`;
      document.body.insertAdjacentHTML("beforeend", modalHtml);
      document.getElementById("loginEmailBtn")?.addEventListener("click", () => { const email = document.getElementById(
          "loginEmail").value;
        if (email) loginUser(email, "user");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("registerBtn")?.addEventListener("click", () => { const email = document.getElementById(
          "loginEmail").value;
        if (email) loginUser(email, "user");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("demoAdminBtn")?.addEventListener("click", () => { loginUser("admin@meon.com", "admin");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("demoDevBtn")?.addEventListener("click", () => { loginUser("dev@meon.com", "developer");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("closeModal")?.addEventListener("click", () => document.getElementById("authModal")?.remove());
    }
    const themeToggle = document.getElementById("themeToggle");
    themeToggle?.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
      localStorage.setItem("meonTheme", document.documentElement.classList.contains("dark") ? "dark" : "light");
      lucide.createIcons();
    });
    if (localStorage.getItem("meonTheme") === "dark") document.documentElement.classList.add("dark");
    renderNav();
    renderCurrentView();
    updateOnlineStatus();
  </script>
</body>
</html>
