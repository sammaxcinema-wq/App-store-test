<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meon | Intelligence · Innovation · Inspiration</title>
  <meta name="description" content="Meon App Store – Daraja M-Pesa STK Push for seamless payments">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { transition: background-color 0.3s, color 0.3s; }
    .dark { background-color: #0f172a; color: #e2e8f0; }
    .rating-star { cursor: pointer; transition: transform 0.1s; }
    .rating-star:hover { transform: scale(1.1); }
    .modal-transition { transition: opacity 0.2s ease, visibility 0.2s; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); }
    .meon-logo-bg {
      background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
      border-radius: 14px;
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.3);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    img.app-logo { background: #1e293b; object-fit: cover; }
    /* Animations for hero */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 20s linear infinite;
    }
    .animate-spin-reverse {
      animation: spin-slow 30s linear infinite reverse;
    }
    @keyframes floatImage {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: floatImage 6s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">

<div id="app" class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800">
    <div class="container mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="meon-logo-bg px-4 py-2 flex flex-col items-start leading-tight">
          <span class="text-white font-extrabold text-2xl tracking-wide">meon</span>
          <span class="text-[10px] font-medium text-purple-200 tracking-wider uppercase">INTELLIGENCE·INNOVATION·INSPIRATION</span>
        </div>
        <span class="font-bold text-xl tracking-tight hidden sm:inline-block">Meon Store</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:inline"></i>
        </button>
        <div id="authSection" class="flex items-center gap-2"></div>
      </div>
    </div>
    <div class="container mx-auto px-4">
      <div class="flex gap-6 overflow-x-auto pb-2 scrollbar-hide">
        <button data-nav="home" class="nav-btn font-semibold py-2 border-b-2 border-purple-600 text-purple-600">Home</button>
        <button data-nav="dashboard" class="nav-btn font-semibold py-2 border-b-2 border-transparent hover:text-gray-700">My Dashboard</button>
        <button data-nav="admin" id="adminNavBtn" class="nav-btn hidden font-semibold py-2 border-b-2 border-transparent">Admin Panel</button>
        <button data-nav="developer" id="devNavBtn" class="nav-btn hidden font-semibold py-2 border-b-2 border-transparent">Developer Hub</button>
      </div>
    </div>
  </header>

  <main id="mainContent" class="flex-1 container mx-auto px-4 py-8"></main>
  <div id="toastContainer"></div>
</div>

<!-- M-Pesa Modal -->
<div id="mpesaModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden modal-transition">
  <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-full max-w-md mx-4">
    <h2 class="text-2xl font-bold mb-2">Pay with M-Pesa</h2>
    <p id="mpesaAppName" class="text-gray-600 dark:text-gray-300 mb-4"></p>
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Phone Number (e.g., 0712345678)</label>
      <input type="tel" id="mpesaPhone" placeholder="0712345678" class="w-full p-2 border rounded-lg dark:bg-gray-700">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Amount (KES)</label>
      <input type="number" id="mpesaAmount" readonly class="w-full p-2 border rounded-lg bg-gray-100 dark:bg-gray-600">
    </div>
    <div class="flex gap-3">
      <button id="mpesaConfirmBtn" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Pay Now</button>
      <button id="mpesaCancelBtn" class="flex-1 bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-white py-2 rounded-lg">Cancel</button>
    </div>
    <p class="text-xs text-gray-500 mt-3 text-center">STK push will be sent to your phone. Enter M-Pesa PIN to complete.</p>
  </div>
</div>

  // App Data (15 apps)
  const appList = [
    { id: "maji-gas", name: "Maji Gas Delivery", slug: "maji-gas-delivery", shortDesc: "Cooking gas & water delivery on demand", category: "Utilities", price: 0, isFree: true, rating: 4.6, ratingCount: 234, downloads: 12540, version: "2.1.0", features: ["Real-time tracking", "Scheduled deliveries", "Multiple payments", "Loyalty rewards"], description: "Fast, reliable LPG and water delivery service with live order tracking." },
    { id: "deep-focus", name: "Deep Focus", slug: "deep-focus", shortDesc: "Pomodoro timer & distraction blocker", category: "Productivity", price: 4.99, isFree: false, rating: 4.8, ratingCount: 1890, downloads: 45200, version: "3.0.2", features: ["Pomodoro timer", "Website blocker", "Focus music", "Analytics"], description: "Boost productivity with science-backed focus tools." },

    { id: "rider-app", name: "Rider App", slug: "rider-app", shortDesc: "Logistics & delivery platform", category: "Transport", price: 0, isFree: true, rating: 4.5, ratingCount: 892, downloads: 67300, version: "2.3.0", features: ["Route optimization", "Live tracking", "Earnings dashboard", "Proof of delivery"], description: "Complete solution for riders and fleets." },
    { id: "insight", name: "Insight", slug: "insight", shortDesc: "Customer analytics platform", category: "Analytics", price: 29.99, isFree: false, rating: 4.6, ratingCount: 178, downloads: 5400, version: "1.8.0", features: ["Segmentation", "Behavioral analytics", "Predictive models", "APIs"], description: "Deep customer behavior intelligence." },
    { id: "clients-hub", name: "Clients Hub", slug: "clients-hub", shortDesc: "CRM for modern business", category: "CRM", price: 14.99, isFree: false, rating: 4.4, ratingCount: 421, downloads: 12400, version: "3.1.0", features: ["Contact mgmt", "Deal tracking", "Email sync", "Forecasting"], description: "Grow relationships with powerful CRM." },
    { id: "smart-duka", name: "Smart Duka", slug: "smart-duka", shortDesc: "Retail management system", category: "Business", price: 9.99, isFree: false, rating: 4.7, ratingCount: 563, downloads: 28900, version: "2.0.0", features: ["Inventory", "POS", "Sales reports", "Supplier mgmt"], description: "Modern POS for small shops." },
    { id: "agriculture", name: "Agriculture", slug: "agriculture", shortDesc: "Smart farming solution", category: "Agriculture", price: 0, isFree: true, rating: 4.3, ratingCount: 197, downloads: 8100, version: "1.4.0", features: ["Crop monitor", "Weather", "Market prices", "Expert advice"], description: "Empower farmers with digital tools." },
    { id: "luminor-studio", name: "Luminor Studio", slug: "luminor-studio", shortDesc: "AI photo & video editing", category: "Design", price: 12.99, isFree: false, rating: 4.9, ratingCount: 734, downloads: 34200, version: "5.0.1", features: ["AI enhancement", "Layer editing", "Filters", "4K export"], description: "Creative suite for professionals." },
    { id: "cv-maker", name: "CV Maker", slug: "cv-maker", shortDesc: "Professional resume builder", category: "Productivity", price: 0, isFree: true, rating: 4.6, ratingCount: 1280, downloads: 98700, version: "1.9.0", features: ["Templates", "PDF export", "LinkedIn import", "Cover letter"], description: "Create job-winning resumes instantly." },
    { id: "matatu-booking", name: "Matatu Booking", slug: "matatu-booking", shortDesc: "Public transport booking", category: "Transport", price: 0, isFree: true, rating: 4.5, ratingCount: 567, downloads: 45300, version: "2.2.0", features: ["Real-time tracking", "Digital tickets", "Route planning", "Fare calc"], description: "Book matatus and track in real-time." },
    { id: "home-search", name: "Home Search", slug: "home-search", shortDesc: "Real estate marketplace", category: "Real Estate", price: 0, isFree: true, rating: 4.4, ratingCount: 398, downloads: 22500, version: "3.3.0", features: ["Property search", "Virtual tours", "Mortgage calc", "Agent contact"], description: "Find dream home or rental." },
    { id: "school-360", name: "School 360", slug: "school-360", shortDesc: "School management system", category: "Education", price: 49.99, isFree: false, rating: 4.8, ratingCount: 245, downloads: 6700, version: "4.1.0", features: ["Student records", "Fee mgmt", "Parent portal", "CBC support"], description: "Complete school ERP with CBC." },
    { id: "kanisa-launcher", name: "Kanisa Launcher", slug: "kanisa-launcher", shortDesc: "Church management & engagement", category: "Religion", price: 0, isFree: true, rating: 4.7, ratingCount: 156, downloads: 5300, version: "1.2.0", features: ["Events", "Giving platform", "Member directory", "Live stream"], description: "Digital tools for modern ministry." }
  ];

  // Attach logos + screenshots
  appList.forEach((app, idx) => {
    app.logoUrl = logoMapping[app.id];
    app.developer = { name: "Meon", verified: true };
    const screenshotIdx = idx % screenshotUrls.length;
    const mainScreenshot = screenshotUrls[screenshotIdx];
    app.screenshots = [mainScreenshot, mainScreenshot];
    app.versions = [{ version: app.version, changelog: "Latest stable release", createdAt: new Date().toISOString() }];
    if (!app.ratingCount) app.ratingCount = Math.floor(Math.random() * 800) + 50;
    if (!app.downloads) app.downloads = Math.floor(Math.random() * 30000) + 1000;
  });

  function generateFallbackSVG(appId, size = 80) {
    const colorMap = {
      "maji-gas": { primary: "#2563EB", secondary: "#F97316", letter: "M" },
      "deep-focus": { primary: "#4F46E5", secondary: "#7C3AED", letter: "D" },
      "guard-ai": { primary: "#3B82F6", secondary: "#94A3B8", letter: "G" },
      "data-vision": { primary: "#10B981", secondary: "#3B82F6", letter: "D" },
      "rider-app": { primary: "#EA580C", secondary: "#111827", letter: "R" },
      "insight": { primary: "#A855F7", secondary: "#06B6D4", letter: "I" },
      "clients-hub": { primary: "#1E3A8A", secondary: "#3B82F6", letter: "C" },
      "smart-duka": { primary: "#10B981", secondary: "#F59E0B", letter: "S" },
      "agriculture": { primary: "#059669", secondary: "#78350F", letter: "A" },
      "luminor-studio": { primary: "#D97706", secondary: "#111827", letter: "L" },
      "cv-maker": { primary: "#2563EB", secondary: "#FFFFFF", letter: "C" },
      "matatu-booking": { primary: "#EAB308", secondary: "#111827", letter: "M" },
      "home-search": { primary: "#0D9488", secondary: "#3B82F6", letter: "H" },
      "school-360": { primary: "#2563EB", secondary: "#10B981", letter: "S" },
      "kanisa-launcher": { primary: "#9333EA", secondary: "#D97706", letter: "K" }
    };
    const c = colorMap[appId] || { primary: "#0F172A", secondary: "#334155", letter: "S" };
    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="${size}" height="${size}">
      <rect width="512" height="512" rx="96" fill="${c.primary}"/>
      <circle cx="256" cy="256" r="140" fill="${c.secondary}" opacity="0.9"/>
      <text x="256" y="340" text-anchor="middle" fill="white" font-size="180" font-weight="bold" font-family="Inter, sans-serif">${c.letter}</text>
    </svg>`;
    return `data:image/svg+xml,${encodeURIComponent(svgString)}`;
  }

  function appLogoImg(app, sizeClass = "w-16 h-16", pixelSize = 60) {
    const externalUrl = app.logoUrl;
    const fallbackSvg = generateFallbackSVG(app.id, pixelSize);
    if (!externalUrl) {
      return `<img src="${fallbackSvg}" class="${sizeClass} rounded-xl shadow object-cover" alt="${app.name}">`;
    }
    return `<img src="${externalUrl}" class="${sizeClass} rounded-xl shadow object-cover" alt="${app.name}" 
      onerror="this.onerror=null; this.src='${fallbackSvg}';">`;
  }

  // State
  let currentUser = JSON.parse(localStorage.getItem("meonUser")) || null;
  let activeView = "home";
  let selectedApp = null;
  let userFavorites = JSON.parse(localStorage.getItem("meonFavorites")) || [];
  let userDownloads = JSON.parse(localStorage.getItem("meonDownloads")) || [];
  let reviewsData = JSON.parse(localStorage.getItem("meonReviews")) || {};
  let searchQuery = "";
  let activeCategoryFilter = "";

  function saveState() {
    if (currentUser) localStorage.setItem("meonUser", JSON.stringify(currentUser));
    else localStorage.removeItem("meonUser");
    localStorage.setItem("meonFavorites", JSON.stringify(userFavorites));
    localStorage.setItem("meonDownloads", JSON.stringify(userDownloads));
    localStorage.setItem("meonReviews", JSON.stringify(reviewsData));
  }

  function showToast(msg, type = "success") {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast bg-white dark:bg-gray-800 shadow-lg rounded-xl px-4 py-3 border-l-4 ${type === "success" ? "border-green-500" : type === "error" ? "border-red-500" : "border-blue-500"} flex items-center gap-2`;
    toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${msg}</span>`;
    container.appendChild(toast);
    if (window.lucide) lucide.createIcons();
    setTimeout(() => toast.remove(), 4000);
  }

  function loginUser(email, role = "user") {
    currentUser = { id: Date.now(), email, name: email.split('@')[0], role: role };
    saveState();
    renderNav();
    renderCurrentView();
    showToast(`Welcome to Meon, ${currentUser.name}!`, "success");
  }
  function logout() { currentUser = null; userFavorites = []; userDownloads = []; saveState(); renderNav(); renderCurrentView(); showToast("Logged out", "success"); }
  
  function toggleFavorite(appId) {
    if (!currentUser) { showToast("Sign in to save favorites", "error"); return false; }
    const idx = userFavorites.indexOf(appId);
    if (idx === -1) { userFavorites.push(appId); showToast("Added to favorites", "success"); }
    else { userFavorites.splice(idx,1); showToast("Removed from favorites", "success"); }
    saveState(); renderCurrentView(); return true;
  }
  
  function downloadApp(app) {
    if (!currentUser) { showToast("Please login to download", "error"); return; }
    if (!app.isFree) {
      showMpesaPaymentModal(app);
      return;
    }
    if (!userDownloads.find(d => d.appId === app.id)) {
      userDownloads.push({ appId: app.id, downloadedAt: new Date().toISOString(), version: app.version });
      app.downloads += 1;
      saveState();
      showToast(`Downloaded ${app.name}`, "success");
      renderCurrentView();
    } else { showToast("Already installed", "info"); }
  }
  
  function submitReview(appId, rating, content) {
    if (!currentUser) { showToast("Login to review", "error"); return false; }
    if (!reviewsData[appId]) reviewsData[appId] = [];
    reviewsData[appId].push({ userId: currentUser.id, user: currentUser.name, rating, content, date: new Date().toISOString() });
    const allRatings = reviewsData[appId].map(r => r.rating);
    const avg = allRatings.reduce((a,b)=>a+b,0)/allRatings.length;
    const appObj = appList.find(a=>a.id === appId);
    if(appObj) { appObj.rating = parseFloat(avg.toFixed(1)); appObj.ratingCount = allRatings.length; }
    saveState();
    showToast("Review submitted", "success");
    renderCurrentView();
    return true;
  }

  // M-Pesa mock
  const USE_REAL_MPESA_API = false;
  async function initiateMpesaPayment(phoneNumber, amount, accountReference, appName) {
    if (USE_REAL_MPESA_API) {
      const response = await fetch('/api/mpesa/stkpush', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phoneNumber, amount, accountReference, transactionDesc: `Purchase of ${appName}` })
      });
      const data = await response.json();
      if (data.success) {
        showToast(`STK push sent to ${phoneNumber}. Enter PIN on your phone.`, "success");
        return true;
      } else {
        showToast(data.error || "Payment failed", "error");
        return false;
      }
    } else {
      return new Promise((resolve) => {
        showToast(`📱 M-Pesa STK push sent to ${phoneNumber} for KES ${amount}. Please check your phone.`, "info");
        setTimeout(() => {
          showToast(`✅ Payment of KES ${amount} for ${appName} successful! Receipt: MOCK${Date.now()}`, "success");
          resolve(true);
        }, 3000);
      });
    }
  }

  let currentPaymentApp = null;
  function showMpesaPaymentModal(app) {
    if (!currentUser) { showToast("Please login to make a purchase", "error"); return; }
    currentPaymentApp = app;
    document.getElementById("mpesaAppName").innerText = `App: ${app.name} - KES ${app.price}`;
    document.getElementById("mpesaAmount").value = app.price;
    document.getElementById("mpesaPhone").value = "";
    document.getElementById("mpesaModal").classList.remove("hidden");
  }

  async function confirmMpesaPayment() {
    const phone = document.getElementById("mpesaPhone").value.trim();
    if (!phone) { showToast("Enter your M-Pesa phone number", "error"); return; }
    if (!currentPaymentApp) return;
    const amount = currentPaymentApp.price;
    const accountReference = `MEON_${currentPaymentApp.id}_${Date.now()}`;
    document.getElementById("mpesaModal").classList.add("hidden");
    const success = await initiateMpesaPayment(phone, amount, accountReference, currentPaymentApp.name);
    if (success) {
      if (!userDownloads.find(d => d.appId === currentPaymentApp.id)) {
        userDownloads.push({ appId: currentPaymentApp.id, downloadedAt: new Date().toISOString(), version: currentPaymentApp.version });
        currentPaymentApp.downloads += 1;
        saveState();
        showToast(`✅ ${currentPaymentApp.name} added to your library`, "success");
        renderCurrentView();
      }
    }
    currentPaymentApp = null;
  }

  // Helper to get filtered apps
  function getFilteredApps() {
    let filtered = [...appList];
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(app => app.name.toLowerCase().includes(q) || app.shortDesc.toLowerCase().includes(q) || app.category.toLowerCase().includes(q));
    }
    if (activeCategoryFilter) {

          </div>
          <button id="demoAdminBtn" class="w-full bg-purple-100 dark:bg-purple-900 py-2 rounded-lg mb-2">Demo Admin Access</button>
          <button id="demoDevBtn" class="w-full bg-amber-100 dark:bg-amber-900 py-2 rounded-lg">Demo Developer Access</button>
          <button id="closeModal" class="w-full mt-3 text-gray-500">Cancel</button>
        </div>
      </div>`;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    document.getElementById("loginEmailBtn")?.addEventListener("click", () => {
      const email = document.getElementById("loginEmail").value;
      if(email) loginUser(email, "user");
      document.getElementById("authModal")?.remove();
    });
    document.getElementById("registerBtn")?.addEventListener("click", () => {
      const email = document.getElementById("loginEmail").value;
      if(email) loginUser(email, "user");
      document.getElementById("authModal")?.remove();
    });
    document.getElementById("demoAdminBtn")?.addEventListener("click", () => { loginUser("admin@meon.com", "admin"); document.getElementById("authModal")?.remove(); });
    document.getElementById("demoDevBtn")?.addEventListener("click", () => { loginUser("dev@meon.com", "developer"); document.getElementById("authModal")?.remove(); });
    document.getElementById("closeModal")?.addEventListener("click", () => document.getElementById("authModal")?.remove());
  }

  function attachHomeInteractions() {
    const searchInput = document.getElementById("globalSearchInput");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value;
        renderCurrentView();
      });
    }
    const categoryChips = document.querySelectorAll(".category-chip");
    categoryChips.forEach(chip => {
      chip.addEventListener("click", () => {
        activeCategoryFilter = chip.getAttribute("data-category");
        renderCurrentView();
      });
    });
    const clearBtn = document.getElementById("clearCategoryBtn");
    if (clearBtn) {
      clearBtn.addEventListener("click", () => {
        activeCategoryFilter = "";
        renderCurrentView();
      });
    }
    const exploreBtn = document.getElementById("exploreMarketplaceBtn");
    if (exploreBtn) {
      exploreBtn.addEventListener("click", () => {
        document.querySelector(".grid.grid-cols-1.sm\\:grid-cols-2")?.scrollIntoView({ behavior: "smooth" });
      });
    }
    const becomeDevBtn = document.getElementById("becomeDevBtn");
    if (becomeDevBtn) {
      becomeDevBtn.addEventListener("click", () => {
        if (!currentUser) showToast("Please login to become a developer", "error");
        else { activeView = "developer"; renderCurrentView(); }
      });
    }
  }

  function renderCurrentView() {
    const container = document.getElementById("mainContent");
    if (!container) return;
    if(selectedApp) container.innerHTML = renderAppDetail();
    else if(activeView === "home") { container.innerHTML = renderHome(); setTimeout(attachHomeInteractions, 50); }
    else if(activeView === "dashboard") container.innerHTML = renderDashboard();
    else if(activeView === "admin") container.innerHTML = renderAdmin();
    else if(activeView === "developer") container.innerHTML = renderDeveloper();
    if (window.lucide) lucide.createIcons();
    if(selectedApp && document.getElementById("reviewStars")) {
      let ratingVal = 0;
      const starDiv = document.getElementById("reviewStars");
      starDiv.innerHTML = '';
      for(let i=1;i<=5;i++){ let star=document.createElement('i'); star.setAttribute('data-lucide','star'); star.className='w-6 h-6 cursor-pointer rating-star'; star.onclick=()=>{ratingVal=i; document.querySelectorAll('#reviewStars i').forEach((s,idx)=>s.style.fill= idx<i ? '#facc15' : 'none');}; starDiv.appendChild(star);}
      if (window.lucide) lucide.createIcons();
      document.getElementById("submitReviewBtn")?.addEventListener("click",()=>{ const txt=document.getElementById("reviewText").value; if(ratingVal && txt) submitReview(selectedApp.id, ratingVal, txt); else showToast("Please provide rating and comment", "error");});
    }
  }
  
  // Navigation listeners
  document.querySelectorAll(".nav-btn").forEach(btn=>{
    btn.addEventListener("click",(e)=>{
      const view = btn.getAttribute("data-nav");
      if(view) { activeView = view; selectedApp = null; renderCurrentView(); }
      document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("border-purple-600","text-purple-600"));
      btn.classList.add("border-purple-600","text-purple-600");
    });
  });
  
  // Theme toggle
  const themeToggle = document.getElementById("themeToggle");
  themeToggle?.addEventListener("click",()=>{ document.documentElement.classList.toggle("dark"); localStorage.setItem("meonTheme", document.documentElement.classList.contains("dark") ? "dark" : "light"); if(window.lucide) lucide.createIcons(); });
  if(localStorage.getItem("meonTheme") === "dark") document.documentElement.classList.add("dark");
  
  // M-Pesa modal handlers
  document.getElementById("mpesaConfirmBtn")?.addEventListener("click", confirmMpesaPayment);
  document.getElementById("mpesaCancelBtn")?.addEventListener("click", () => {
    document.getElementById("mpesaModal").classList.add("hidden");
    currentPaymentApp = null;
  });
  
  renderNav();
  renderCurrentView();
  window.toggleFavorite = toggleFavorite;
  window.downloadApp = downloadApp;
</script>
</body>
</html>
